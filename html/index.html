<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Sistemas Embarcados - Portal</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #00979C;
            padding: 30px;
            text-align: center;
            color: white;
            font-size: 25px;
        }

        section { display: flex; flex: 1; }

        nav {
            width: 30%;
            background: #e6f4f4;
            padding: 20px;
            border-right: 1px solid #ccc;
        }

        nav h3 { margin-bottom: 15px; color: #006468; }

        nav ul { list-style-type: none; }

        nav ul li { margin-bottom: 10px; }

        nav ul li a {
            display: block;
            background-color: rgb(6, 141, 96);
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        nav ul li a:hover {
            background-color: #00979C;
            transform: scale(1.02);
        }

        article {
            width: 70%;
            background-color: #f1f1f1;
            padding: 10px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: white;
            border-radius: 5px;
        }

        footer {
            background-color: #006468;
            padding: 15px;
            text-align: center;
            color: white;
        }

        @media (max-width: 600px) {
            section { flex-direction: column; }
            nav, article { width: 100%; height: auto; }
            article { height: 450px; }
        }
    </style>
</head>
<body>

<header>
    <h2>Guia de Embarcados  & Eletronica</h2>
</header>

<section>
    <nav>
        <h3>Material de Apoio</h3>
        <ul>
            <li><a href="imagens/arduino.png" target="janela">Pinagem Arduino</a></li>
            <li><a href="imagens/esp32.png" target="janela">Pinagem ESP32</a></li>
            <li><a href="imagens/raspberry.png" target="janela">GPIO Raspberry Pi</a></li>
            <li><a href="imagens/resistores.png" target="janela">Tabela de Resistores</a></li>
            <li><a href="imagens/Ide_Driver.png" target="janela">instalação IDE + Driver</a></li>
            <li><a href="imagens/Calcular_Resistencia.png" target="janela">Calcular Resistencia </a></li>
        </ul>
    </nav>
    
    <article>
        <iframe name="janela" src="imagens/boasvindas.png"></iframe>
        <p style="text-align: center; margin-top: 5px;">Selecione uma referência visual para carregar no quadro.</p>
    </article>
</section>

<footer>
    <p>Gabriel Cleto - 2026</p>
</footer>

</body>
</html>
