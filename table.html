<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula função Table</title>

    <style>
        table,
        th,
        td {
            border: 1px solid black;
        }
    </style>
</head>

<body>
    <table style="width: 50%;">
        <tr >
            <th style="width: 10%;">Nome</th>
            <th style="width: 10%;">Sobrenome</th>
            <th style="width: 10%;">Idade</th>
            <th style="width: 10%;">Cidade</th>
        </tr>

        <tr>
            <td>Gabriel</td>
            <td>Cleto</td>
            <td>23</td>
            <td>São Paulo</td>
        </tr>
        
        <tr>
            <td>Luana</td>
            <td>Maeda</td>
            <td>26</td>
            <TD>São Paulo</TD>
        </tr>
    </table>

</body>

</html>
